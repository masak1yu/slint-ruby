name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libfontconfig-dev xvfb libgl1-mesa-dev libx11-xcb-dev

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cargo-cache: true

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run bundle exec rake test

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: bundle exec rake test
